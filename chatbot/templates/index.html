<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flour Co. Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f0e8;
      display: flex;
      justify-content: center;
      align-items: stretch;
      height: 100vh;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 720px;
      background: #fff;
      box-shadow: 0 0 24px rgba(0,0,0,0.10);
    }

    /* Header */
    header {
      background: #c8a96e;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header .logo { font-size: 22px; }
    header h1 { font-size: 17px; font-weight: 600; letter-spacing: 0.3px; }
    header p  { font-size: 12px; opacity: 0.85; }

    /* Chat area */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }
    .bubble.bot {
      align-self: flex-start;
      background: #f5f0e8;
      border: 1px solid #e0d4bc;
      border-bottom-left-radius: 4px;
      color: #333;
    }
    .bubble.user {
      align-self: flex-end;
      background: #c8a96e;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble.error {
      align-self: flex-start;
      background: #fff0f0;
      border: 1px solid #f5c6c6;
      color: #b94a48;
      border-bottom-left-radius: 4px;
    }

    /* Typing indicator */
    .typing {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
      background: #f5f0e8;
      border: 1px solid #e0d4bc;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }
    .typing span {
      width: 7px; height: 7px;
      background: #c8a96e;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40%           { transform: scale(1.0); opacity: 1.0; }
    }

    /* Footer / input */
    footer {
      background: #c8a96e;
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    #input {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      background: #fff;
      color: #333;
    }
    #input::placeholder { color: #aaa; }
    #send {
      padding: 10px 20px;
      background: #a0793e;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #send:hover  { background: #8a6330; }
    #send:active { background: #7a5628; }
    #send:disabled { opacity: 0.55; cursor: default; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">🌾</div>
    <div>
      <h1>Flour Co. Assistant</h1>
      <p>Ask about products, pricing, inventory, suppliers or orders</p>
    </div>
  </header>

  <div id="messages">
    <div class="bubble bot">
      Hello! I can answer questions about our flour products, pricing, inventory levels,
      suppliers, and order history. What would you like to know?
    </div>
  </div>

  <footer>
    <input id="input" type="text" placeholder="Ask a question…" autocomplete="off" />
    <button id="send">Send</button>
  </footer>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send');

  function addBubble(text, type) {
    const div = document.createElement('div');
    div.className = `bubble ${type}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.disabled = true;
    sendBtn.disabled = true;

    addBubble(text, 'user');
    const indicator = addTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
      const data = await res.json();
      indicator.remove();

      if (res.ok && data.answer) {
        addBubble(data.answer, 'bot');
      } else {
        addBubble(data.error || 'Something went wrong. Please try again.', 'error');
      }
    } catch {
      indicator.remove();
      addBubble('Network error. Please check your connection and try again.', 'error');
    } finally {
      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
  inputEl.focus();
</script>
</body>
</html>
